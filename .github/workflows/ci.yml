name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Format, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run backend lint
        run: npm run lint:backend

      - name: Run frontend lint
        run: npm run lint:frontend

      - name: Check formatting
        run: npm run format:check

      - name: Run backend tests
        run: npm test

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -f Dockerfile.backend -t ${{ secrets.ACR_LOGIN_SERVER }}/movies-backend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/movies-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -f Dockerfile.frontend -t ${{ secrets.ACR_LOGIN_SERVER }}/movies-frontend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/movies-frontend:latest
