name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, Format, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      # Menjalankan pengecekan kualitas kode otomatis
      - name: Run Global Code Quality Check
        run: npm run lint

      # Mengetes koneksi backend ke database MongoDB cloud bikinanmu
      - name: Run backend tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          NODE_ENV: test
          JWT_SECRET: alskdfjlkasdfjlksa23123asdlfk
        run: npm test

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Build backend Docker image
        run: docker build -f Dockerfile.backend -t mern-movies-backend:ci .

      - name: Build frontend Docker image
        run: docker build -f Dockerfile.frontend -t mern-movies-frontend:ci .