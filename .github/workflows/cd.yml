name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE_NAME: mernmoviesapp-backend
  FRONTEND_IMAGE_NAME: mernmoviesapp-frontend

jobs:
  build-and-push:
    name: Build and Push Images to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run backend tests
        run: npm test

      - name: Build frontend assets
        run: npm run build:frontend

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:${{ steps.vars.outputs.image_tag }} \
            -t $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest \
            .

      - name: Build frontend image
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            API_URL="${{ secrets.PRODUCTION_BACKEND_URL }}"
          else
            API_URL="${{ secrets.STAGING_BACKEND_URL }}"
          fi

          docker build \
            -f Dockerfile.frontend \
            --build-arg VITE_API_URL=$API_URL \
            -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:${{ steps.vars.outputs.image_tag }} \
            -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:latest \
            .

      - name: Push backend image
        run: |
          docker push $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:${{ steps.vars.outputs.image_tag }}
          docker push $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest

      - name: Push frontend image
        run: |
          docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:${{ steps.vars.outputs.image_tag }}
          docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    if: github.event.inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_STAGING }}

      - name: Deploy backend container to staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME_STAGING }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mernmoviesapp-backend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy frontend container to staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME_STAGING }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mernmoviesapp-frontend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Smoke test staging backend
        run: curl -f ${{ secrets.STAGING_BACKEND_URL }}/api/v1/health

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PRODUCTION }}

      - name: Deploy backend container to production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME_PRODUCTION }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mernmoviesapp-backend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Deploy frontend container to production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_WEBAPP_NAME_PRODUCTION }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/mernmoviesapp-frontend:${{ needs.build-and-push.outputs.image_tag }}

      - name: Smoke test production backend
        run: curl -f ${{ secrets.PRODUCTION_BACKEND_URL }}/api/v1/health
