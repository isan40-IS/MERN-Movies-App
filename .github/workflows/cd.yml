name: CD Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE_NAME: mernmoviesapp-backend
  FRONTEND_IMAGE_NAME: mernmoviesapp-frontend

jobs:
  build-and-push:
    name: Build and Push Images to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run backend tests
        run: npm test

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Select API URL
        id: config
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "api_url=${{ secrets.PRODUCTION_BACKEND_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=${{ secrets.STAGING_BACKEND_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest \
            .

      - name: Build frontend image
        run: |
          docker build \
            -f Dockerfile.frontend \
            --build-arg VITE_API_URL=${{ steps.config.outputs.api_url }} \
            -t $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:latest \
            .

      - name: Push backend image
        run: docker push $ACR_LOGIN_SERVER/$BACKEND_IMAGE_NAME:latest

      - name: Push frontend image
        run: docker push $ACR_LOGIN_SERVER/$FRONTEND_IMAGE_NAME:latest

      - name: Smoke test backend
        run: |
          echo "Waiting for Azure App Service to pull and start the new container..."
          sleep 120

          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl --fail --silent --show-error --max-time 15 "${{ steps.config.outputs.api_url }}/api/v1/health"; then
              echo "Backend is healthy."
              exit 0
            fi

            echo "Backend not ready yet. Retrying in 30 seconds..."
            sleep 30
          done

          echo "Backend health check failed after multiple attempts."
          exit 1
